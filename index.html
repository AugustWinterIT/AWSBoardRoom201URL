<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="refresh" content="60">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; display: flex; flex-direction: column; height: 100vh; background: #0d0d0d; filter: invert(1) hue-rotate(180deg); }
    iframe { filter: invert(1) hue-rotate(180deg); }
    /* ---- TOP BAR ---- */
    .top-bar {
      background: linear-gradient(90deg, #0d0d0d 0%, #1a3a1a 50%, #0d0d0d 100%);
      border-bottom: 2px solid #2ecc71;
      color: white;
      text-align: center;
      padding: 10px;
      font-size: 22px;
      font-family: Arial, sans-serif;
      font-weight: bold;
    }
    /* ---- CALENDAR ---- */
    iframe {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: none;
      filter: invert(1) hue-rotate(120deg);
    }
  </style>
</head>
<body>
  <div class="top-bar">AWS Boardroom 201</div>

</html>

<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="refresh" content="60">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      overflow: hidden; 
      background: #1a1a2e;
    }

    .top-bar {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      z-index: 10;
      height: 48px;
      background: linear-gradient(90deg, #0d0d0d 0%, #069494 50%, #0d0d0d 100%);
      border-bottom: 2px solid #069494;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      font-size: 22px;
      font-weight: bold;
      color: #0d0d0d;
      letter-spacing: 1px;
    }

    iframe {
      position: fixed;
      top: 48px; left: 0;
      width: 100%;
      height: calc(100% - 48px);
      border: none;
      filter: invert(1) hue-rotate(160deg);
    }
  </style>
</head>
<body>
  <div class="top-bar">📅 AWS Boardroom 201</div>
  <iframe src="https://outlook.office365.com/owa/calendar/c870a918327b420ebb3668c5dbd6d87c@augustwinter.com/03fcf3fb788947aba6baf1d59342fbfb18057765420360446687/calendar.html"></iframe>
</body>
</html>
